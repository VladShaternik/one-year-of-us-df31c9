<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#FAF6EE">
<title>Vlad &amp; Macy: One Year of Us</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23D8A7A7' d='M12 21s-8-5.5-8-11a4.5 4.5 0 0 1 8-2.8A4.5 4.5 0 0 1 20 10c0 5.5-8 11-8 11z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* =====================================================================
   ONE YEAR OF US - styles
   Palette: cream, sage, dusty rose, warm ink, night navy.
   You should not need to edit anything in here; all text, dates, and
   photo paths live in the CONFIG object at the top of the <script>
   at the bottom of this file.
   ===================================================================== */

:root{
  --cream:#FAF6EE;
  --cream-2:#F2EBDC;
  --paper:#FFFDF7;
  --sage:#9CAF88;
  --sage-deep:#71855E;
  --rose:#D8A7A7;
  --rose-deep:#B97F7F;
  --ink:#4F463B;
  --ink-soft:#857867;
  --gold:#E8C98F;
  --night:#1A2238;
  --night-deep:#0C1226;
  --shadow:0 10px 30px rgba(79,70,59,.10);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Lora',Georgia,'Times New Roman',serif;
  font-size:16px;
  line-height:1.7;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{display:block;max-width:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

.hand{font-family:'Caveat',cursive}
.wrap{width:min(100% - 2.4rem, 680px);margin-inline:auto;position:relative;z-index:2}
section{position:relative;padding:4.5rem 0}

/* ---- section headings ---- */
.sec-head{text-align:center;margin-bottom:2.4rem}
.kicker{
  font-size:.72rem;letter-spacing:.24em;text-transform:uppercase;
  color:var(--sage-deep);font-weight:500;
}
.sec-head h2{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(2.1rem, 9vw, 2.8rem);
  font-weight:600;line-height:1.15;margin:.4rem 0 .8rem;
}
.intro{color:var(--ink-soft);max-width:52ch;margin-inline:auto;font-size:.98rem}

/* ---- story cards ---- */
.card{
  background:var(--paper);
  border:1px solid rgba(79,70,59,.08);
  border-radius:16px;
  padding:1.15rem 1.15rem 1.3rem;
  box-shadow:var(--shadow);
}
.card .year{
  display:inline-block;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
  padding:.18rem .65rem;border-radius:99px;margin-bottom:.6rem;font-weight:500;
}
.card h3{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.45rem;font-weight:600;line-height:1.2;margin-bottom:.45rem;
}
.card p{font-size:.93rem;color:var(--ink-soft)}

/* ---- photos and placeholders ---- */
.photo{border-radius:10px;overflow:hidden;margin-bottom:.85rem;aspect-ratio:4/3;background:var(--cream-2)}
.photo img{width:100%;height:100%;object-fit:cover}
.photo-ph{
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.15rem;background:var(--cream-2);border:1.5px dashed rgba(113,133,94,.45);border-radius:10px;
}
.photo-ph .sprig-svg{width:44px;height:44px;opacity:.85}
.ph-label{font-family:'Caveat',cursive;font-size:1.05rem;color:var(--sage-deep)}
.ph-file{font-size:.62rem;letter-spacing:.06em;color:var(--ink-soft);font-family:ui-monospace,Menlo,monospace}

/* ---- reveal on scroll ---- */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .9s ease, transform .9s cubic-bezier(.22,.8,.3,1)}
.reveal.in{opacity:1;transform:none}

/* ---- cover ---- */
.cover{
  position:relative;min-height:100vh;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;overflow:hidden;padding:2rem 1.5rem;
}
.cover-names{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;
  font-size:clamp(3.4rem, 17vw, 5.5rem);line-height:1.02;margin:.8rem 0 1rem;
}
.cover-names span{display:block}
.cover-names .amp{
  font-family:'Caveat',cursive;color:var(--rose-deep);
  font-size:clamp(2rem, 9vw, 3rem);line-height:1.25;
}
.cover-sub{color:var(--ink-soft);font-style:italic;max-width:34ch;margin-inline:auto}
.scroll-hint{
  position:absolute;bottom:max(1.6rem, env(safe-area-inset-bottom));left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;color:var(--sage-deep);
}
.scroll-hint .hand{font-size:1.15rem}
.hint-line{
  width:1.5px;height:34px;border-radius:2px;
  background:linear-gradient(to bottom, var(--sage-deep), transparent);
  animation:hintDrop 1.8s ease-in-out infinite;
}
@keyframes hintDrop{
  0%{transform:scaleY(.2);transform-origin:top;opacity:0}
  45%{transform:scaleY(1);opacity:1}
  100%{transform:scaleY(1);transform-origin:top;opacity:0}
}
.sprig{position:absolute;width:92px;height:92px;opacity:.8;pointer-events:none}
.sprig svg{width:100%;height:100%}
.c-tl{top:10px;left:6px;transform:rotate(90deg)}
.c-tr{top:10px;right:6px;transform:rotate(180deg)}
.c-bl{bottom:10px;left:6px}
.c-br{bottom:10px;right:6px;transform:scaleX(-1)}

/* falling petals */
.petals{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.petal{position:absolute;top:-26px;animation:petalFall linear infinite}
.petal i{
  display:block;width:10px;height:14px;background:var(--rose);
  border-radius:80% 12% 80% 12%;
  animation:petalSway ease-in-out infinite alternate;
}
.petal:nth-child(3n) i{background:var(--sage);width:8px;height:13px}
.petal:nth-child(4n) i{background:var(--rose-deep)}
@keyframes petalFall{to{transform:translateY(112vh)}}
@keyframes petalSway{
  from{transform:translateX(-9px) rotate(-40deg)}
  to{transform:translateX(9px) rotate(35deg)}
}

/* ---- 1. two paths ---- */
/* overflow:clip (not hidden) so position:sticky keeps working inside */
#paths{overflow:clip;padding-top:5.5rem}

/* pin-and-play: the wrapper is given extra height in JS; the card inside
   sticks to the viewport while the user scrolls through that extra runway,
   and the scroll distance drives the vignette's acts */
.pin-stage{position:relative;width:100%;margin-bottom:2rem}
.pin-sticky{position:sticky;top:6vh;top:max(2.2rem, calc((100svh - 680px) / 2))}
.threads{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.threads path{fill:none;stroke-width:2.5;stroke-linecap:round}
.threads .thread-him{stroke:var(--sage)}
.threads .thread-her{stroke:var(--rose)}

.maps-row{display:flex;align-items:center;gap:.5rem;margin-bottom:2.8rem}
.map-card{
  flex:1 1 0;min-width:0;background:var(--paper);border:1px solid rgba(79,70,59,.08);
  border-radius:14px;padding:.85rem .7rem .7rem;box-shadow:var(--shadow);text-align:center;
}
.map-card svg{width:80%;height:auto;margin:0 auto .35rem}
.map-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.1rem;font-weight:600;line-height:1.1}
.map-sub{font-size:.6rem;color:var(--ink-soft);letter-spacing:.12em;text-transform:uppercase;margin-top:.18rem}
.map-label{font-size:8.5px;fill:var(--ink-soft);font-family:'Lora',serif}
.map-dot{fill:var(--rose-deep)}
.map-land{fill:var(--cream-2);stroke:var(--sage-deep);stroke-width:1.5;stroke-linejoin:round}
.map-gap{flex:0 0 58px;display:flex;flex-direction:column;align-items:center;gap:.25rem;text-align:center}
.map-gap .hand{font-size:.95rem;line-height:1.15;color:var(--rose-deep)}
.gap-line{width:100%;height:auto}

.path-card{width:86%;margin-bottom:2rem;position:relative}
.path-card.him{margin-right:auto;border-top:3px solid var(--sage)}
.path-card.her{margin-left:auto;border-top:3px solid var(--rose)}
.path-card.him .year{background:rgba(156,175,136,.18);color:var(--sage-deep)}
.path-card.her .year{background:rgba(216,167,167,.22);color:var(--rose-deep)}
.who-chip{
  position:absolute;top:-15px;font-family:'Caveat',cursive;font-size:1.1rem;
  background:var(--paper);padding:.05rem .7rem;border-radius:99px;
  border:1px solid rgba(79,70,59,.12);line-height:1.5;
}
.path-card.him .who-chip{left:14px;color:var(--sage-deep)}
.path-card.her .who-chip{right:14px;color:var(--rose-deep)}

.flight{margin-top:.9rem;background:var(--cream-2);border-radius:10px;padding:.55rem .55rem .3rem}
.flight svg{width:100%;height:auto;display:block}
.flight-path{
  stroke:var(--sage-deep);stroke-width:1.6;fill:none;
  stroke-dasharray:4 6;stroke-linecap:round;
  animation:flightDash 7s linear infinite;
}
.flight-label{font-size:9px;fill:var(--ink-soft);font-family:'Lora',serif}
.flight-stop{fill:var(--rose-deep)}
@keyframes flightDash{to{stroke-dashoffset:-100}}

/* ---- birth vignettes: three-act scenes that play as you scroll ---- */
.vignette{position:relative}
.vig-stage{position:absolute;inset:0;opacity:0;transition:opacity .55s ease}
.vig-stage svg{width:100%;height:100%;display:block}
.scene svg{width:100%;height:100%;display:block}
.vignette[data-stage="0"] .vig-stage[data-i="0"],
.vignette[data-stage="1"] .vig-stage[data-i="1"],
.vignette[data-stage="2"] .vig-stage[data-i="2"]{opacity:1}
.vig-cap{
  position:absolute;left:50%;bottom:.55rem;transform:translateX(-50%);
  width:max-content;max-width:92%;
  background:rgba(255,253,247,.9);color:var(--ink);
  padding:.05rem .7rem;border-radius:99px;
  font-size:1.02rem;line-height:1.45;text-align:center;
  opacity:0;transition:opacity .55s ease;pointer-events:none;
}
.vignette[data-stage="0"] .vig-cap[data-i="0"],
.vignette[data-stage="1"] .vig-cap[data-i="1"],
.vignette[data-stage="2"] .vig-cap[data-i="2"]{opacity:1}
.vig-dots{position:absolute;top:.55rem;right:.65rem;display:flex;gap:5px;z-index:3}
.vig-dots i{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,253,247,.6);box-shadow:0 0 0 1px rgba(79,70,59,.35);
  transition:background .3s ease;
}
.vignette[data-stage="0"] .vig-dots i:nth-child(1),
.vignette[data-stage="1"] .vig-dots i:nth-child(2),
.vignette[data-stage="2"] .vig-dots i:nth-child(3){
  background:var(--rose-deep);box-shadow:0 0 0 2px rgba(255,253,247,.85);
}

/* small ambient movements inside the scenes */
.vg-tw{animation:twinkle 2.8s ease-in-out infinite alternate}
.vg-glowwin{animation:lampFlicker 3s ease-in-out infinite alternate}
.vg-beat{transform-box:fill-box;transform-origin:center;animation:vgBeat 1.7s ease-in-out infinite}
@keyframes vgBeat{0%,100%{scale:1}28%{scale:1.28}}
.vg-sway{transform-box:fill-box;transform-origin:top center;animation:vgSway 2.6s ease-in-out infinite alternate}
@keyframes vgSway{from{rotate:-8deg}to{rotate:8deg}}
.vg-popstar{transform-box:fill-box;transform-origin:center;animation:vgPopStar 3.2s ease-in-out infinite}
@keyframes vgPopStar{0%,15%{opacity:0;scale:.3}30%,72%{opacity:1;scale:1}88%,100%{opacity:0;scale:.5}}
.vg-breathe{transform-box:fill-box;transform-origin:center;animation:vgBreathe 3.4s ease-in-out infinite alternate}
@keyframes vgBreathe{from{scale:.94}to{scale:1.06}}

/* ---- 2. convergence ---- */
#converge{overflow:clip}
.meet-card{width:88%;margin:0 auto 2rem}
.meet-card .year{background:rgba(232,201,143,.32);color:#96763B}

.wheel-stage{margin-top:1rem;text-align:center;position:relative}
.wheel-btn{display:block;margin:0 auto;width:min(230px,72%)}
.wheel-btn svg{width:100%;height:auto;display:block}
#wheelSpin{transition:transform 2.6s cubic-bezier(.3,.7,.2,1);transform-origin:100px 92px}
.wheel-hint{font-size:1.05rem;color:var(--sage-deep)}
.wheel-bubble{
  position:absolute;left:50%;top:0;transform:translateX(-50%) scale(.85);opacity:0;
  background:var(--paper);border:1px solid rgba(79,70,59,.15);border-radius:14px;
  padding:.5rem .85rem;font-family:'Caveat',cursive;font-size:1.2rem;line-height:1.25;
  width:max-content;max-width:92%;box-shadow:var(--shadow);
  transition:opacity .35s ease, transform .35s ease;pointer-events:none;z-index:3;
}
.wheel-bubble.show{opacity:1;transform:translateX(-50%) scale(1)}

/* ---- 3. the pier ---- */
#pier{padding:4.5rem 0}
.pier-head{margin-bottom:2rem}
.pier-scene{
  position:relative;height:min(92svh,740px);min-height:540px;overflow:hidden;
  background:linear-gradient(#39456e 0%, var(--night) 30%, #121a36 56%, #0C1226 100%);
}
.pier-scene::before{
  content:"";position:absolute;top:0;left:0;right:0;height:64px;z-index:8;pointer-events:none;
  background:linear-gradient(var(--cream), rgba(250,246,238,0));
}
.pier-scene::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:54px;z-index:8;pointer-events:none;
  background:linear-gradient(rgba(250,246,238,0), var(--cream));
}
.pier-stage{position:absolute;inset:0;max-width:760px;margin:0 auto}
.pier-water{
  position:absolute;left:0;right:0;bottom:0;height:38%;z-index:1;
  background:linear-gradient(#222e58 0%, #131c3d 35%, #0a1130 100%);
}
.moonpath{
  position:absolute;top:0;bottom:0;right:10%;width:54px;
  background:repeating-linear-gradient(to bottom, rgba(240,230,200,.09) 0 3px, transparent 3px 10px);
  filter:blur(2px);
  -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), transparent 80%);
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), transparent 80%);
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer{to{background-position:0 24px}}
.glint{
  position:absolute;height:1.5px;border-radius:2px;
  background:linear-gradient(90deg, transparent, rgba(214,226,255,.55), transparent);
  animation:glint 4.5s ease-in-out infinite;
}
@keyframes glint{0%,100%{opacity:.1}50%{opacity:.8}}
.moon{
  position:absolute;top:30%;right:9%;width:54px;height:54px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 38% 35%, #FFFDF2, #F0E6C8 62%, #D8CBA2);
  box-shadow:0 0 44px 14px rgba(248,240,210,.22);
}
.pier-sky{position:absolute;left:0;right:0;top:0;height:62%;z-index:2}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 3s ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.2;transform:scale(.8)}to{opacity:.95;transform:scale(1.05)}}
.mem-star{
  position:absolute;width:40px;height:40px;margin:-20px 0 0 -20px;z-index:6;
  display:flex;align-items:center;justify-content:center;
}
.mem-star svg{width:20px;height:20px;filter:drop-shadow(0 0 6px rgba(232,201,143,.95));animation:memPulse 2.6s ease-in-out infinite alternate}
@keyframes memPulse{from{transform:scale(.82)}to{transform:scale(1.12)}}
.secret-star{
  position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;z-index:6;
  display:flex;align-items:center;justify-content:center;
}
.secret-star svg{width:11px;height:11px;opacity:.5;animation:twinkle 4.5s ease-in-out infinite alternate}
.shoot{
  position:absolute;width:130px;height:2px;z-index:5;border-radius:2px;
  background:linear-gradient(90deg, #fff, transparent);
  animation:shoot 1.1s ease-out forwards;
}
@keyframes shoot{
  from{transform:rotate(-32deg) translateX(0);opacity:1}
  to{transform:rotate(-32deg) translateX(-300px);opacity:0}
}
.pier-sil{position:absolute;left:0;bottom:0;width:min(100%,640px);height:auto;z-index:3}
.lamp-halo{animation:lampFlicker 3.4s ease-in-out infinite alternate}
@keyframes lampFlicker{from{opacity:.55}to{opacity:1}}
.pier-text{
  position:absolute;left:50%;transform:translateX(-50%);top:7%;width:88%;
  text-align:center;color:#EDE6D6;z-index:7;
}
.pier-text .kicker{color:var(--gold)}
.pier-date{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:.8rem}
.pier-place{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(1.9rem,8vw,2.5rem);font-weight:600;color:#F5EFDF;line-height:1.12;margin:.3rem 0 .2rem}
.pier-coords{font-size:.68rem;letter-spacing:.14em;color:#9AA3C0;font-family:ui-monospace,Menlo,monospace}
.said-yes{font-size:clamp(1.6rem,7vw,2rem);color:#fff;margin-top:.6rem}

/* ---- bracelet + counter ---- */
#pierAfter{margin-top:2rem}
.bracelet-card{text-align:center;margin-bottom:1.4rem}
.bracelet-btn{display:block;width:min(270px,82%);margin:0 auto .3rem}
.bracelet-btn svg{width:100%;height:auto;display:block}
.bracelet-card p{font-size:.92rem;color:var(--ink-soft)}
.tap-hint{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--sage-deep);margin-top:.45rem}
.firefly{filter:drop-shadow(0 0 4px var(--gold));animation:fireflyGlow 2.2s ease-in-out infinite alternate}
@keyframes fireflyGlow{from{opacity:.55}to{opacity:1}}
.pier-photo-card{text-align:center;margin-bottom:1.4rem}
.pier-photo-card .photo{margin-bottom:.6rem}
.modal-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.7rem;font-weight:600;margin-top:.4rem}
.modal-text{color:var(--ink-soft);font-size:.92rem;margin-top:.5rem}

.counter-card{
  background:var(--night);color:#F3EDDC;border-radius:18px;text-align:center;
  padding:1.5rem 1rem 1.2rem;box-shadow:0 18px 50px rgba(12,18,38,.35);margin-top:.4rem;
}
.counter-card .kicker{color:var(--gold)}
.count-grid{display:flex;justify-content:center;gap:.5rem;margin:1rem 0 .6rem}
.count-tile{
  flex:1;max-width:88px;background:rgba(255,255,255,.06);
  border:1px solid rgba(232,201,143,.25);border-radius:12px;padding:.6rem .15rem .5rem;
}
.count-num{
  display:block;font-family:'Cormorant Garamond',Georgia,serif;font-size:1.85rem;
  font-weight:600;line-height:1.1;font-variant-numeric:tabular-nums;color:#fff;
}
.count-lab{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:#B9C0D8}
.count-foot{color:var(--rose);font-size:1.3rem}

/* ---- 4. year one polaroids ---- */
.pol-flow{display:flex;flex-direction:column}
.pol{
  width:min(86%,340px);margin-bottom:2.1rem;perspective:1200px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  --p:1;
}
/* cards drift in with extra tilt and settle to rest as they arrive */
.pol:not(.alt){align-self:flex-start;margin-left:2%;rotate:calc(-1.6deg - (1 - var(--p)) * 2.6deg)}
.pol.alt{align-self:flex-end;margin-right:2%;rotate:calc(1.4deg + (1 - var(--p)) * 2.6deg)}
.pol-front .photo img{height:116%;translate:0 calc(var(--p) * -16px)}
.pol-inner{display:grid;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.3,.7,.25,1)}
.pol.flipped .pol-inner{transform:rotateY(180deg)}
.pol-face{
  grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--paper);border:1px solid rgba(79,70,59,.1);border-radius:6px;
  box-shadow:0 12px 30px rgba(79,70,59,.16);padding:.7rem .7rem 1.05rem;
  position:relative;display:flex;flex-direction:column;
}
.pol-front .photo{aspect-ratio:1/1;border-radius:3px;margin-bottom:.55rem}
.pol-date{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--rose-deep)}
.pol-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.32rem;font-weight:600;line-height:1.15;margin:.12rem 0 .3rem}
.pol-cap{font-size:.84rem;color:var(--ink-soft);line-height:1.55}
.pol-corner{position:absolute;right:.6rem;bottom:.35rem;font-size:1rem;color:var(--sage-deep);opacity:.85}
.pol-back{transform:rotateY(180deg);justify-content:center;text-align:center;background:var(--cream-2)}
.pol-back .hand{font-size:1.4rem;line-height:1.4;color:var(--ink)}
.pol-back .pol-date{margin-top:.9rem}

/* ---- memory box (inline in the year flow, after its polaroid) ---- */
.box-inline{width:100%;margin:-.4rem 0 2.4rem;text-align:center}
.box-inline .tap-hint{margin-top:.3rem}
.box-scene{position:relative;height:440px;display:flex;align-items:flex-end;justify-content:center;perspective:700px}
.video-card{margin-top:1.5rem;text-align:center;padding:.7rem .7rem .6rem}
.video-card video{
  display:block;width:100%;aspect-ratio:16/9;border-radius:10px;
  background:#161410;object-fit:contain;
}
.video-ph{aspect-ratio:16/9;width:100%}
.video-cap{font-size:1.1rem;color:var(--sage-deep);margin-top:.45rem}
.mbox{position:relative;display:block;width:min(240px,70%);height:130px;-webkit-tap-highlight-color:transparent}
.mbox-body{
  position:absolute;inset:0;z-index:1;display:block;border-radius:9px;
  background:linear-gradient(#CDB897, #B89F7C);border:2px solid #A78D67;overflow:hidden;
}
.mbox-body::after{
  content:"";position:absolute;inset:0;opacity:.5;
  background-image:radial-gradient(var(--rose) 2px, transparent 2.6px), radial-gradient(var(--sage) 1.6px, transparent 2.2px);
  background-size:38px 30px, 26px 22px;
  background-position:6px 8px, 18px 16px;
}
.mbox-lid{
  position:absolute;left:-7px;right:-7px;bottom:calc(100% - 8px);height:44px;z-index:3;display:block;
  background:linear-gradient(#C0A984, #AE946E);border:2px solid #A78D67;border-radius:9px;
  transform-origin:top center;transition:transform .9s cubic-bezier(.3,.7,.25,1);
  box-shadow:0 6px 16px rgba(79,70,59,.18);
}
.mbox.open .mbox-lid{transform:rotateX(-108deg)}
.mbox-heart{position:absolute;left:50%;bottom:calc(100% + 22px);transform:translateX(-50%);z-index:4;transition:opacity .4s}
.mbox.open .mbox-heart{opacity:0}
.mbox-note{
  position:absolute;left:50%;bottom:84px;width:128px;z-index:2;display:block;
  background:var(--paper);border:1px solid rgba(79,70,59,.2);border-radius:6px;
  padding:.45rem .5rem;font-size:1.1rem;line-height:1.15;text-align:center;
  box-shadow:var(--shadow);color:var(--ink);
  opacity:0;transform:translate(-50%, 46px) rotate(0deg) scale(.4);
  transition:transform .7s cubic-bezier(.25,.8,.3,1), opacity .5s ease;pointer-events:none;
}
.mbox.open .mbox-note{opacity:1;transform:var(--fly)}

/* ---- 6. to be continued ---- */
#ending{
  padding-bottom:2.4rem;
  background:linear-gradient(180deg, var(--cream) 0%, #F8E7D7 55%, var(--cream) 100%);
}
.ending-lines{text-align:center;margin:1.4rem 0 0}
.ending-lines p{font-size:1rem;color:var(--ink-soft);font-style:italic;margin:.6rem 0}
.ending-big{
  font-size:clamp(2.7rem, 13vw, 3.8rem);color:var(--rose-deep);
  text-align:center;margin-top:1.8rem;line-height:1.1;
}
.ending-threads{margin-top:1.2rem}
.ending-threads svg{display:block;margin:0 auto;width:66px;height:auto}

/* ---- story strips: little scenes on the cards, driven by --p ----
   .pop  appears and scales in once --p passes its --t threshold
   .grow stretches up from the ground as --p passes --t
   .drawp draws a path (needs pathLength="100") as --p passes --t
   .fadeAt / .fadeOutAt cross-fade groups around --t                  */
.story-strip{margin-top:.95rem;background:var(--cream-2);border-radius:10px;padding:.45rem .55rem .3rem;overflow:hidden}
.story-strip svg{width:100%;height:auto;display:block}
.pop{
  opacity:clamp(0, calc((var(--p, 1) - var(--t, .3)) * 6), 1);
  scale:clamp(.2, calc(.2 + (var(--p, 1) - var(--t, .3)) * 5), 1);
  transform-box:fill-box;transform-origin:center;
}
.grow{
  scale:1 clamp(.02, calc((var(--p, 1) - var(--t, 0)) * 2.6), 1);
  transform-box:fill-box;transform-origin:center bottom;
}
.drawp{
  stroke-dasharray:100;
  stroke-dashoffset:calc(100 - 100 * clamp(0, calc((var(--p, 1) - var(--t, 0)) * 1.3), 1));
}
.fadeAt{opacity:clamp(0, calc((var(--p, 1) - var(--t, .5)) * 7), 1)}
.fadeOutAt{opacity:clamp(0, calc((var(--t, .5) - var(--p, 1)) * 7 + 1), 1)}
.kf-capY{animation:capY 1s linear both paused;animation-delay:calc(var(--p, 1) * -1s)}
@keyframes capY{0%{translate:0 20px}55%{translate:0 -22px}100%{translate:0 12px}}
.capSpin{rotate:calc(var(--p, 1) * 320deg);transform-box:fill-box;transform-origin:center}
.floatUp{animation:floatUp 2.8s ease-in infinite}
@keyframes floatUp{0%{translate:0 10px;opacity:0}30%{opacity:1}100%{translate:0 -16px;opacity:0}}
.tvGlow{animation:lampFlicker 2.4s ease-in-out infinite alternate}
.sunSpin{transform-box:fill-box;transform-origin:center;animation:sunSpin 16s linear infinite}
@keyframes sunSpin{to{rotate:360deg}}
.pathRider{offset-rotate:0deg;offset-distance:calc(var(--p, 1) * 100%)}
.wheelScroll{transform-origin:100px 92px;transform:rotate(calc(var(--p, 0) * 90deg))}
.flight-draw{fill:none;stroke:var(--sage-deep);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:100;stroke-dashoffset:100}

/* ---- Cyra the cat ---- */
.cat-run{
  position:fixed;left:-170px;bottom:12px;z-index:80;pointer-events:none;
  animation:catWalk 7s linear forwards;
}
@keyframes catWalk{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 340px))}}
.cat-run svg{width:86px;height:auto;display:block;animation:catBob .55s ease-in-out infinite alternate}
@keyframes catBob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.cat-tail{transform-origin:10px 24px;animation:tailSway 1.1s ease-in-out infinite alternate}
@keyframes tailSway{from{transform:rotate(-8deg)}to{transform:rotate(10deg)}}
.cat-bubble{
  position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:var(--paper);border:1px solid rgba(79,70,59,.15);border-radius:12px;
  padding:.15rem .6rem;font-family:'Caveat',cursive;font-size:1.1rem;
  white-space:nowrap;box-shadow:var(--shadow);color:var(--ink);
}

/* ---- toast (little notes that pop up) ---- */
.toast{
  position:fixed;left:50%;bottom:max(1.4rem, env(safe-area-inset-bottom));
  transform:translate(-50%, 16px);z-index:60;
  width:min(88vw, 340px);background:var(--paper);color:var(--ink);
  border:1px solid rgba(79,70,59,.12);border-radius:14px;
  padding:.85rem 1.05rem;box-shadow:0 14px 40px rgba(12,18,38,.25);
  font-family:'Caveat',cursive;font-size:1.25rem;line-height:1.35;text-align:center;
  opacity:0;pointer-events:none;transition:opacity .35s ease, transform .35s ease;
}
.toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}

/* ---- modal ---- */
.modal{
  position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;
  background:rgba(20,16,11,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .3s ease;padding:1.4rem;
}
.modal.show{opacity:1;pointer-events:auto}
.modal-panel{
  background:var(--paper);border-radius:18px;max-width:380px;width:100%;
  padding:1.6rem 1.4rem 1.5rem;text-align:center;position:relative;
  box-shadow:0 24px 70px rgba(12,18,38,.4);
  transform:scale(.92);transition:transform .3s cubic-bezier(.22,.8,.3,1);
}
.modal.show .modal-panel{transform:scale(1)}
.modal-close{
  position:absolute;top:.5rem;right:.7rem;font-size:1.5rem;color:var(--ink-soft);
  width:42px;height:42px;line-height:1;
}

/* ---- footer ---- */
.site-foot{
  text-align:center;padding:3.2rem 1.4rem calc(2.6rem + env(safe-area-inset-bottom));
  position:relative;
}
.foot-sign{font-size:1.3rem;color:var(--ink-soft);max-width:30ch;margin:0 auto .9rem}
.paw-btn{
  display:inline-flex;align-items:center;gap:.4rem;color:var(--ink-soft);
  padding:.5rem .9rem;border-radius:99px;border:1px dashed rgba(79,70,59,.25);
}
.paw-btn svg{width:20px;height:20px;opacity:.7}
.paw-btn .hand{font-size:1.05rem}

/* ---- reduced motion ---- */
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  *,*::before,*::after{animation-duration:.001s !important;animation-iteration-count:1 !important;transition-duration:.001s !important}
  .reveal{opacity:1;transform:none}
  .flight-draw{stroke-dashoffset:0 !important}
}
</style>

const $  = (s, root) => (root || document).querySelector(s);
const $$ = (s, root) => Array.from((root || document).querySelectorAll(s));
const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function el(tag, cls, html){
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (html != null) n.innerHTML = html;
  return n;
}

const SPRIG_SVG = `<svg class="sprig-svg" viewBox="0 0 64 64" aria-hidden="true">
  <path d="M8 58C20 46 26 38 32 26S46 10 56 6" fill="none" stroke="var(--sage-deep)" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M20 44q-10-2-12-12 10 0 12 12z" fill="var(--sage)"/>
  <path d="M26 36q2-12 12-14-2 12-12 14z" fill="var(--sage)"/>
  <path d="M36 22q-10-2-11-12 10 1 11 12z" fill="var(--sage)"/>
  <circle cx="49" cy="12" r="3" fill="var(--rose)"/>
  <circle cx="56" cy="6" r="2.2" fill="var(--rose-deep)"/>
  <circle cx="44" cy="18" r="2" fill="var(--rose)"/>
</svg>`;

/* photo with graceful placeholder while the real file is missing */
function photoEl(src, alt){
  const fig = el("figure", "photo");
  const img = new Image();
  img.loading = "lazy";
  img.alt = alt || "";
  img.onerror = () => {
    const ph = el("div", "photo-ph",
      SPRIG_SVG +
      `<span class="ph-label">add photo</span>` +
      `<span class="ph-file">${src.split("/").pop()}</span>`);
    img.replaceWith(ph);
  };
  img.src = src;
  fig.appendChild(img);
  return fig;
}

/* toast helper */
let toastTimer = null;
function showToast(html, ms){
  const t = $("#toast");
  t.innerHTML = html;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms || 4200);
  t.onclick = () => t.classList.remove("show");
}

/* modal helper */
function openModal(html){
  const m = $("#modal");
  $("#modalPanel").innerHTML = `<button class="modal-close" aria-label="Close">&times;</button>` + html;
  m.classList.add("show");
  $(".modal-close", m).onclick = closeModal;
  m.onclick = (e) => { if (e.target === m) closeModal(); };
}
function closeModal(){ $("#modal").classList.remove("show"); }

/* section headers from CONFIG.sections */
function renderSectionHeads(){
  $$(".sec-head[data-sec]").forEach(h => {
    const s = CONFIG.sections[h.dataset.sec];
    if (!s) return;
    h.innerHTML = `<p class="kicker">${s.kicker}</p><h2>${s.title}</h2><p class="intro">${s.intro}</p>`;
  });
}

/* cover */
function renderCover(){
  $("#coverKicker").textContent = CONFIG.cover.kicker;
  $("#nameHim").textContent = CONFIG.names.him;
  $("#nameHer").textContent = CONFIG.names.her;
  $("#coverSub").textContent = CONFIG.cover.subtitle;
  $$(".sprig").forEach(s => s.innerHTML = SPRIG_SVG);
  $("#signoff").textContent = CONFIG.ending.signoff;
  ["#coverKicker", ".cover-names", "#coverSub", ".scroll-hint"].forEach((sel, i) => {
    const n = $(sel);
    if (!n) return;
    n.classList.add("reveal");
    n.style.transitionDelay = (0.15 + i * 0.18) + "s";
  });
}

/* falling petals on the cover */
function setupPetals(){
  if (reduced) return;
  const host = $("#petals");
  for (let i = 0; i < 14; i++){
    const p = el("span", "petal");
    p.style.left = (Math.random() * 100) + "%";
    p.style.animationDuration = (9 + Math.random() * 8) + "s";
    p.style.animationDelay = (-Math.random() * 16) + "s";
    p.style.opacity = .35 + Math.random() * .4;
    const inner = el("i");
    inner.style.animationDuration = (2.4 + Math.random() * 2) + "s";
    p.appendChild(inner);
    host.appendChild(p);
  }
}

/* reveal-on-scroll */
function setupReveals(){
  if (reduced){ $$(".reveal").forEach(n => n.classList.add("in")); return; }
  const io = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); }
    });
  }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
  $$(".reveal").forEach(n => io.observe(n));
}

/* a vignette fills the photo slot and advances through its acts with --p */
function vignetteEl(key){
  const art = VIGNETTE_ART[key] || [];
  const caps = (CONFIG.vignettes && CONFIG.vignettes[key]) || [];
  const fig = el("figure", "photo vignette");
  fig.dataset.stage = 0;
  art.forEach((svg, i) => {
    const s = el("div", "vig-stage", svg);
    s.dataset.i = i;
    fig.appendChild(s);
  });
  caps.forEach((c, i) => {
    const sp = el("span", "vig-cap hand", c);
    sp.dataset.i = i;
    fig.appendChild(sp);
  });
  const dots = el("span", "vig-dots");
  art.forEach(() => dots.appendChild(el("i")));
  fig.appendChild(dots);
  return fig;
}

/* maps pinned scroll progress to the vignette's acts, with a small hold
   at the start and end of the runway */
function vignetteDriver(fig){
  const n = Math.max(1, fig.querySelectorAll(".vig-stage").length);
  return p => {
    const pe = Math.min(1, Math.max(0, (p - 0.07) / 0.86));
    const idx = Math.min(n - 1, Math.floor(pe * n));
    if (+fig.dataset.stage !== idx) fig.dataset.stage = idx;
  };
}

/* strips read --p inherited from their pinned card; no own registration */
function stripEl(key){
  return el("div", "story-strip", STRIPS[key]);
}

/* the flight map draws itself and a little plane rides the route;
   returns a driver fed by the card's pinned runway progress */
function flightDriver(f){
  const base = $(".flight-path", f);
  const draw = $(".flight-draw", f);
  const plane = $(".flight-plane", f);
  let L = 0;
  return p => {
    if (!L) L = base.getTotalLength();
    if (!L) return;
    const t = Math.min(1, p * 1.12);
    if (draw) draw.style.strokeDashoffset = 100 - 100 * t;
    if (plane){
      const pt = base.getPointAtLength(t * L);
      const pt2 = base.getPointAtLength(Math.min(L, t * L + 2));
      const ang = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
      plane.setAttribute("transform", `translate(${pt.x.toFixed(1)} ${pt.y.toFixed(1)}) rotate(${ang.toFixed(1)})`);
    }
  };
}

function pathCard(item, side, labeled){
  const c = el("article", `card path-card reveal ${side}`);
  if (labeled) c.appendChild(el("span", "who-chip", side === "him" ? CONFIG.names.him : CONFIG.names.her));
  if (item.vignette) c.appendChild(vignetteEl(item.vignette));
  else c.appendChild(photoEl(item.photo, item.title));
  c.appendChild(el("span", "year", item.year));
  c.appendChild(el("h3", null, item.title));
  c.appendChild(el("p", null, item.text));
  if (item.anim && STRIPS[item.anim]) c.appendChild(stripEl(item.anim));

function ferrisSvg(){
  const cx = 100, cy = 92, r = 66;
  let spokes = "", pods = "", lights = "";
  for (let i = 0; i < 8; i++){
    const a = i * Math.PI / 4;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    spokes += `<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--rose-deep)" stroke-width="2"/>`;
    pods += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="8.5" fill="${i % 2 ? "var(--rose)" : "var(--sage)"}" stroke="var(--paper)" stroke-width="2"/>`;
    const b = a + Math.PI / 8;
    lights += `<circle cx="${(cx + r * Math.cos(b)).toFixed(1)}" cy="${(cy + r * Math.sin(b)).toFixed(1)}" r="2" fill="var(--gold)"/>`;
  }
  return `<svg viewBox="0 0 200 200" aria-hidden="true">
    <line x1="100" y1="92" x2="62" y2="192" stroke="var(--ink-soft)" stroke-width="4" stroke-linecap="round"/>
    <line x1="100" y1="92" x2="138" y2="192" stroke="var(--ink-soft)" stroke-width="4" stroke-linecap="round"/>
    <line x1="46" y1="193" x2="154" y2="193" stroke="var(--ink-soft)" stroke-width="4" stroke-linecap="round"/>
    <g class="wheelScroll"><g id="wheelSpin">
      <circle cx="100" cy="92" r="66" fill="none" stroke="var(--rose-deep)" stroke-width="2.5"/>
      ${spokes}${lights}${pods}
    </g></g>
    <circle cx="100" cy="92" r="9" fill="var(--rose-deep)"/>
  </svg>`;
}

/* ---- the two threads, drawn as you scroll ---- */
const SVG_NS = "http://www.w3.org/2000/svg";
const threadStates = [];

function wavyDown(x, h, amp, seg){
  let d = `M ${x} 0`, y = 0, s = 1;
  while (y < h){
    const ny = Math.min(y + seg, h);
    d += ` C ${x + amp * s} ${y + seg * 0.33}, ${x + amp * s} ${y + seg * 0.66}, ${x} ${ny}`;
    y = ny; s = -s;
  }
  return d;
}
/* after the threads meet, they braid around each other down the page */
function braidDown(d, cx, y0, h, amp, seg, s){
  let y = y0;
  while (y < h){
    const ny = Math.min(y + seg, h);
    d += ` C ${cx + amp * s} ${y + seg * 0.33}, ${cx + amp * s} ${y + seg * 0.66}, ${cx} ${ny}`;
    y = ny; s = -s;
  }
  return d;
}
function buildThreads(){
  sizePinStages(); /* runway heights first, so section measurements are right */
  threadStates.length = 0;
  [["#paths", "#pathsThreads", false], ["#converge", "#convergeThreads", true]].forEach(([secSel, svgSel, converging]) => {
    const sec = $(secSel), svg = $(svgSel);
    if (!sec || !svg) return;
    const W = sec.clientWidth, H = sec.offsetHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    svg.innerHTML = "";
    const xHim = Math.max(10, W * 0.035), xHer = W - xHim;
    const defs = converging
      ? [
          { cls: "thread-him", d: braidDown(`M ${xHim} 0 C ${xHim} ${H * 0.16}, ${W / 2 - W * 0.18} ${H * 0.3}, ${W / 2} ${H * 0.42}`, W / 2, H * 0.42, H, 13, 110, 1) },
          { cls: "thread-her", d: braidDown(`M ${xHer} 0 C ${xHer} ${H * 0.16}, ${W / 2 + W * 0.18} ${H * 0.3}, ${W / 2} ${H * 0.42}`, W / 2, H * 0.42, H, 13, 110, -1) },
        ]
      : [
          { cls: "thread-him", d: wavyDown(xHim, H, Math.min(14, W * 0.02), 170) },
          { cls: "thread-her", d: wavyDown(xHer, H, Math.min(14, W * 0.02), 170) },
        ];
    const paths = defs.map(def => {
      const p = document.createElementNS(SVG_NS, "path");
      p.setAttribute("d", def.d);
      p.setAttribute("class", def.cls);
      svg.appendChild(p);
      const L = p.getTotalLength();
      p.style.strokeDasharray = L;
      p.style.strokeDashoffset = reduced ? 0 : L;
      return { p, L };
    });
    threadStates.push({ sec, paths });
  });
}
let threadTick = false;
function drawThreads(){
  threadTick = false;
  const vh = window.innerHeight;
  threadStates.forEach(st => {
    const r = st.sec.getBoundingClientRect();
    const prog = Math.min(1, Math.max(0, (vh * 0.88 - r.top) / r.height));
    st.paths.forEach(({ p, L }) => p.style.strokeDashoffset = L * (1 - prog));
  });
}
function onThreadScroll(){
  if (!threadTick){ threadTick = true; requestAnimationFrame(drawThreads); }
}
/* ---- scroll story engine ----------------------------------------------
   Elements registered here get a CSS custom property --p that goes from 0
   (element entering at the bottom of the screen) to 1 (element risen to
   about a third from the top). All the little story animations key off it.
   With reduced motion, everything is pinned to its finished state. */
const storyItems = new Map();
const storyActive = new Set();
const storyIO = new IntersectionObserver(entries => {
  entries.forEach(en => {
    if (en.isIntersecting) storyActive.add(en.target);
    else storyActive.delete(en.target);
  });
  onStoryScroll();
}, { rootMargin: "30% 0px 30% 0px" });

function registerStory(el, fn){
  if (reduced){
    el.style.setProperty("--p", 1);
    if (fn) fn(1);
    return;
  }
  storyItems.set(el, { fn: fn || null, p: -1 });
  storyIO.observe(el);
}
/* pin-and-play: while the .pin-stage runway scrolls by, its sticky card
   stays on screen and --p (set on `target`) goes 0 -> 1 over the runway */
function registerPinned(stage, target, fn){
  if (reduced){
    target.style.setProperty("--p", 1);
    if (fn) fn(1);
    return;
  }
  storyItems.set(stage, { fn: fn || null, p: -1, pin: true, target });
  storyIO.observe(stage);
}
function sizePinStages(){
  if (reduced) return;
  const vh = window.innerHeight;
  $$(".pin-stage").forEach(stage => {
    const sticky = stage.firstElementChild;
    const h = sticky.offsetHeight;
    const factor = parseFloat(stage.dataset.travel || "1.3");
    /* center short cards; anchor tall cards by their bottom so the
       animation strip stays on screen while pinned */
    const top = h <= vh - 28 ? (vh - h) / 2 : vh - h - 14;
    sticky.style.top = top.toFixed(1) + "px";
    stage.style.height = (h + vh * factor) + "px";
  });
}

/* wrap an animated card in a pin-and-play runway */
function pinCard(flow, card, drivers, travel){
  const stage = el("div", "pin-stage");
  stage.dataset.travel = travel;
  const sticky = el("div", "pin-sticky");
  sticky.appendChild(card);
  stage.appendChild(sticky);
  flow.appendChild(stage);
  const fn = drivers.length ? p => drivers.forEach(d => d(p)) : null;
  registerPinned(stage, card, fn);
}
let storyTick = false;
function storyFrame(){
  storyTick = false;
  const vh = window.innerHeight;
  storyActive.forEach(node => {
    const it = storyItems.get(node);
    if (!it) return;
    const r = node.getBoundingClientRect();
    let p;
    if (it.pin){
      const sticky = node.firstElementChild;
      const off = parseFloat(getComputedStyle(sticky).top) || 0;
      const travel = Math.max(1, node.offsetHeight - sticky.offsetHeight);
      p = (off - r.top) / travel;
    } else {
      p = (vh - r.top) / (vh * 0.68);
    }
    p = Math.min(1, Math.max(0, p));
    p = Math.round(p * 400) / 400;
    if (it.p === p) return;
    it.p = p;
    (it.target || node).style.setProperty("--p", p);
    if (it.fn) it.fn(p);
  });
}
function onStoryScroll(){
  if (!storyTick){ storyTick = true; requestAnimationFrame(storyFrame); }
}
function setupStoryEngine(){
  if (reduced) return;
  window.addEventListener("scroll", onStoryScroll, { passive: true });
  window.addEventListener("resize", onStoryScroll);
  window.addEventListener("load", onStoryScroll);
  onStoryScroll();
}

let threadResizeTimer = null;
function setupThreads(){
  buildThreads();
  window.addEventListener("load", () => { buildThreads(); if (!reduced) onThreadScroll(); });
  window.addEventListener("resize", () => {
    clearTimeout(threadResizeTimer);
    threadResizeTimer = setTimeout(() => { buildThreads(); if (!reduced) onThreadScroll(); }, 200);
  });
  if (!reduced){
    window.addEventListener("scroll", onThreadScroll, { passive: true });
    onThreadScroll();
  }
}
function startCounter(){
  const t0 = new Date(CONFIG.pier.timestamp).getTime();
  function tick(){
    const diff = Math.max(0, Date.now() - t0);
    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff / 3600000) % 24;
    const m = Math.floor(diff / 60000) % 60;
    const s = Math.floor(diff / 1000) % 60;
    const set = (id, v, pad) => {
      const n = $("#" + id);
      if (n) n.textContent = pad ? String(v).padStart(2, "0") : v.toLocaleString();
    };
    set("cDays", d, false);
    set("cHours", h, true);
    set("cMins", m, true);
    set("cSecs", s, true);
  }
  tick();
  setInterval(tick, 1000);
}

  <circle cx="64" cy="18" r="11" fill="#fff" stroke="#D8CFC0" stroke-width="1.2"/>

</svg>`;

function setupExtras(){
  /* soft parallax: cover sprigs drift, the moon eases down over the water */
  if (!reduced){
    let ticking = false;
    window.addEventListener("scroll", () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        ticking = false;
        const y = window.scrollY;
        if (y < window.innerHeight * 1.2){
          $$(".cover .sprig").forEach((s, i) => {
            s.style.translate = `0 ${(y * (i % 2 ? .1 : .06)).toFixed(1)}px`;
          });
        }
        const sc = $("#pierScene");
        if (sc){
          const r = sc.getBoundingClientRect();
          if (r.top < window.innerHeight && r.bottom > 0){
            const m = $(".moon", sc);
            if (m) m.style.translate = `0 ${((window.innerHeight - r.top) * .045).toFixed(1)}px`;
          }
        }
      });
    }, { passive: true });
  }

  /* Cyra walks across the screen */
  $("#pawBtn").addEventListener("click", () => {
    if ($(".cat-run")) return;
    const cat = el("div", "cat-run",
      `<div class="cat-bubble">Hiiiii, Princess</div>` + CAT_SVG);
    if (reduced){
      cat.style.animation = "none";
      cat.style.left = "50%";
      cat.style.transform = "translateX(-50%)";
    }
    document.body.appendChild(cat);
    setTimeout(() => cat.remove(), reduced ? 4000 : 7400);
  });
}

function init(){
  setupStoryEngine();
  renderCover();
  renderSectionHeads();
  renderPaths();
  renderConverge();
  renderPier();
  renderYear();
  renderEnding();
  setupPetals();
  setupThreads();
  startCounter();
  setupExtras();
  setupReveals();
}
init();
</script>
